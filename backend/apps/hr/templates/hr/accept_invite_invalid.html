<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Invalid</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-red-50 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center">
        <div class="text-6xl mb-6">❌</div>
        <h1 class="text-3xl font-bold text-red-700 mb-4">Invitation Expired or Invalid</h1>
        <p class="text-gray-600 mb-8">{{ error|default:"This invitation link is no longer valid or has already been used." }}</p>
        
        <a href="/" 
           class="inline-block bg-gray-700 hover:bg-gray-800 text-white px-8 py-3 rounded-2xl font-medium">
            Go to Homepage
        </a>
    </div>
</body>
</html>
